<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Email - Dojo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }
        
        .status {
            margin: 30px 0;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .status.success {
            color: #4CAF50;
        }
        
        .status.error {
            color: #f44336;
        }
        
        .status.loading {
            color: #2196F3;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        button {
            background: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: left;
            display: none;
        }
        
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: left;
            display: none;
        }
        
        .info {
            font-size: 14px;
            color: #666;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✉️</div>
        <h1>Confirmar Email</h1>
        
        <div class="status loading" id="status">
            <span class="spinner"></span>
            Procesando tu confirmación...
        </div>
        
        <div id="loadingMessage" style="display: none;">
            Por favor espera mientras confirmamos tu email.
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <button id="retryButton" style="display: none; background: #2196F3;" onclick="retryConfirmation()">
            Reintentar
        </button>
        
        <div class="info">
            <p>Si no ves cambios en los próximos segundos, vuelve a intentar.</p>
        </div>
    </div>

    <script>
        // Obtener parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        
        async function confirmEmail() {
            try {
                if (!token || !email) {
                    showError('Parámetros inválidos. Token o email faltante.');
                    return;
                }
                
                const response = await fetch('http://10.0.2.2:5221/api/auth/confirm-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        token: token
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess(data.message || 'Email confirmado exitosamente. Ya puedes iniciar sesión.');
                } else {
                    showError(data.message || 'Error al confirmar tu email. Intenta de nuevo.');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Error de conexión: ' + error.message + '. Verifica que la API esté ejecutándose en http://10.0.2.2:5221');
            }
        }
        
        function showSuccess(message) {
            document.getElementById('status').innerHTML = '✅ Email confirmado';
            document.getElementById('status').className = 'status success';
            document.getElementById('successMessage').innerHTML = '<strong>¡Éxito!</strong><br>' + message;
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('retryButton').style.display = 'none';
        }
        
        function showError(message) {
            document.getElementById('status').innerHTML = '❌ Error al confirmar';
            document.getElementById('status').className = 'status error';
            document.getElementById('errorMessage').innerHTML = '<strong>Error:</strong><br>' + message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('retryButton').style.display = 'block';
        }
        
        function retryConfirmation() {
            document.getElementById('status').innerHTML = '<span class="spinner"></span> Reintentando...';
            document.getElementById('status').className = 'status loading';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('retryButton').style.display = 'none';
            confirmEmail();
        }
        
        // Ejecutar confirmación cuando cargue la página
        window.addEventListener('load', confirmEmail);
    </script>
</body>
</html>
